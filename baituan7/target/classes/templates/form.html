<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${book.id} == null ? 'Thêm Sách Mới' : 'Sửa Thông Tin Sách'">Form Sách</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        * { font-family: 'Be Vietnam Pro', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        input:focus, select:focus, textarea:focus { border-color: #667eea !important; box-shadow: 0 0 0 3px rgba(102,126,234,0.15) !important; outline: none; }
        .input-field { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 12px; padding: 12px 16px; font-size: 14px; transition: all 0.2s; background: #f9fafb; }
        .input-field:focus { background: white; }
        .drop-zone { border: 2px dashed #d1d5db; border-radius: 16px; transition: all 0.2s; cursor: pointer; }
        .drop-zone:hover { border-color: #667eea; background: #f5f3ff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-gray-900 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center h-16 gap-4">
            <a th:href="@{/books}" class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <div class="w-px h-5 bg-gray-700"></div>
            <div class="w-8 h-8 gradient-bg rounded-xl flex items-center justify-center shadow-lg">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            </div>
            <span class="text-white font-bold">BookStore</span>
            <span class="text-gray-600 text-sm">/</span>
            <span class="text-gray-400 text-sm" th:text="${book.id} == null ? 'Thêm sách mới' : 'Sửa sách'"></span>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="gradient-bg">
    <div class="max-w-2xl mx-auto px-6 py-10">
        <h1 class="text-2xl font-bold text-white" th:text="${book.id} == null ? 'Thêm Sách Mới' : 'Sửa Thông Tin Sách'"></h1>
        <p class="text-purple-200 text-sm mt-1" th:text="${book.id} == null ? 'Điền đầy đủ thông tin để thêm sách vào hệ thống.' : 'Cập nhật thông tin sách bên dưới.'"></p>
    </div>
</div>

<!-- Form Card -->
<main class="max-w-2xl mx-auto px-6 -mt-5 pb-12">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">

        <form th:action="@{/books}" th:object="${book}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}"/>

            <div class="p-8 space-y-6">

                <!-- Tên sách -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Tên Sách <span class="text-red-400 normal-case">*</span></label>
                    <input type="text" th:field="*{title}" required placeholder="Nhập tên sách..." class="input-field"/>
                </div>

                <!-- Tác giả -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Tác Giả <span class="text-red-400 normal-case">*</span></label>
                    <input type="text" th:field="*{author}" required placeholder="Nhập tên tác giả..." class="input-field"/>
                </div>

                <!-- Giá & Thể loại -->
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Giá Bán <span class="text-red-400 normal-case">*</span></label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-semibold text-sm">₫</span>
                            <input type="number" step="1000" th:field="*{price}" required placeholder="0"
                                   class="input-field pl-8"/>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Thể Loại</label>
                        <input type="text" th:field="*{category}" placeholder="VD: Tiểu thuyết, Khoa học..." class="input-field"/>
                    </div>
                </div>

                <!-- Upload ảnh -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Ảnh Bìa Sách</label>

                    <!-- Ảnh hiện tại -->
                    <div th:if="${book.imageUrl != null}" class="flex items-center gap-4 mb-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
                        <img th:src="${book.imageUrl}" alt="Ảnh bìa" class="w-16 h-20 object-cover rounded-lg shadow-md border border-gray-200"/>
                        <div>
                            <p class="text-sm font-semibold text-gray-700">Ảnh bìa hiện tại</p>
                            <p class="text-xs text-gray-400 mt-0.5">Tải ảnh mới bên dưới để thay thế</p>
                        </div>
                    </div>

                    <!-- Drop zone -->
                    <label class="drop-zone flex flex-col items-center justify-center py-10 px-6 text-center" id="dropZone">
                        <div id="dropContent">
                            <div class="w-14 h-14 bg-violet-50 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-violet-100">
                                <svg class="w-7 h-7 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            </div>
                            <p class="text-sm font-semibold text-gray-600">Nhấp để chọn ảnh</p>
                            <p class="text-xs text-gray-400 mt-1">PNG, JPG, WEBP — Tối đa 5MB</p>
                        </div>
                        <img id="imagePreview" src="#" alt="Xem trước" class="hidden max-h-48 rounded-xl shadow-md border border-gray-200 mt-2"/>
                        <input type="file" name="imageFile" accept="image/*" class="hidden" onchange="xemTruoc(this)"/>
                    </label>
                </div>
            </div>

            <!-- Footer buttons -->
            <div class="px-8 py-5 bg-gray-50 border-t border-gray-100 flex gap-3">
                <button type="submit" class="btn-primary flex-1 text-white font-bold py-3.5 rounded-xl shadow-lg text-sm flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                    Lưu Sách
                </button>
                <a th:href="@{/books}" class="flex-1 text-center bg-white hover:bg-gray-100 text-gray-600 font-semibold py-3.5 rounded-xl transition text-sm border border-gray-200 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    Hủy
                </a>
            </div>
        </form>
    </div>
</main>

<script>
function xemTruoc(input) {
    const preview = document.getElementById('imagePreview');
    const content = document.getElementById('dropContent');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.classList.remove('hidden');
            content.classList.add('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</body>
</html>
